services:
  api:
    build: .
    container_name: belaguest_api
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    command: npm run dev
    # Static IPs ensure the 'mysql' entry in extra_hosts below always matches the
    # MySQL container's assigned address. If you change either IP, update both.
    networks:
      belaguest_net:
        ipv4_address: 172.28.0.3
    extra_hosts:
      - "mysql:172.28.0.2"

  mysql:
    image: mysql:8.0
    container_name: belaguest_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      belaguest_net:
        ipv4_address: 172.28.0.2

networks:
  belaguest_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24

volumes:
  mysql_data:
