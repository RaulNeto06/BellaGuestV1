version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: belaguest_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: belaguest_db
      MYSQL_USER: belaguest
      MYSQL_PASSWORD: belaguest123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "belaguest", "-pbelaguest123"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: belaguest_api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DB_HOST: mysql
      DB_USER: belaguest
      DB_PASSWORD: belaguest123
      DB_NAME: belaguest_db
      PORT: 3000
      JWT_SECRET: change_this_in_production_very_secret_key
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./public:/app/public

volumes:
  mysql_data:
